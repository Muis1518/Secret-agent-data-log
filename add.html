

<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <title>Nieuw lek</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>Nieuw lek registreren</h1>
  <a href="index.html">← Terug</a>
</header>

<form id="leakForm" class="form">
  <label>Slachtoffer naam</label>
  <input id="slachtoffer" required>

  <label>Beschrijving</label>
  <textarea id="description" required></textarea>

  <label>Datum</label>
  <input id="date" type="date" required>

  <label>Foto</label>
  <input id="photo" type="file" accept="image/*" required>

  <button type="submit">Lek opslaan</button>
</form>

<script src="script.js"></script>
</body>
</html>
